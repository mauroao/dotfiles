set -g status-style fg=green,bg=black
set -g mouse on
set -g set-titles on
set -g set-titles-string '#S:#I #W'

# Start window and pane indices at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Re-number windows sequentially after closing any of them
set -g renumber-windows on

# Use Ctrl+a as the only prefix key
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Move the status bar to the top
set -g status-position top
set -g status-right '#{?client_prefix,[Ctrl+a] ,}#H %Y-%m-%d %H:%M'

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window status formatting
setw -g window-status-format         " #I #W "
setw -g window-status-current-format " #I #W "
setw -g window-status-current-style  "fg=black,bg=green,bold"
setw -g window-status-style          "fg=colour242,bg=black"
setw -g window-status-separator      "  "
